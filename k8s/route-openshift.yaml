# OpenShift Route alternative to ingress.yaml.
# Use this INSTEAD of ingress.yaml when running on OpenShift.
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: invest-app
  labels:
    app: invest-app
spec:
  to:
    kind: Service
    name: invest-app
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
