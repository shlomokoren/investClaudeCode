apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Applies the namespace to every resource below.
namespace: invest-app

resources:
  - namespace.yaml
  - configmap.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  # For OpenShift, comment out ingress.yaml above and uncomment the line below:
  # - route-openshift.yaml
