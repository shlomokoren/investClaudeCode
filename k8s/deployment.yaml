apiVersion: apps/v1
kind: Deployment
metadata:
  name: invest-app
  labels:
    app: invest-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: invest-app
  template:
    metadata:
      labels:
        app: invest-app
    spec:
      containers:
        - name: invest-app
          # Replace with your registry/image:tag (built from the project Dockerfile).
          image: investclaudecode:dev01
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 5000
          env:
            - name: HOST
              value: "0.0.0.0"
            - name: PORT
              value: "5000"
            - name: DEBUG
              value: "false"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: config
              mountPath: /app/config.json
              subPath: config.json
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: invest-app-config
